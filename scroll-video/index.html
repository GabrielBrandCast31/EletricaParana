<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Expansion Text Blend</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  .scroll-track { position: relative; height: 400vh; }              /* distância de rolagem */
  .sticky-stage { position: sticky; top: 0; height: 100vh; width: 100%; overflow: hidden; }

  .bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

  .video-frame {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: var(--w, 360px); height: var(--h, 460px);
    border-radius: var(--radius, 24px); overflow: hidden; z-index: 2;
    box-shadow: 0 20px 60px rgba(0,0,0,.35); will-change: width, height;
  }
  .video-frame video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .hero-text {
    position: absolute; inset: 0; z-index: 3;
    display: flex; align-items: center; justify-content: center; text-align: center;
    pointer-events: none; color: #fff; text-shadow: 0 2px 24px rgba(0,0,0,.45);
    mix-blend-mode: overlay;
  }
  .hero-text h1 { font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 800; line-height: 1.05; letter-spacing: -.02em; }

  .hero-subtitle { position: absolute; bottom: 14%; left: 0; width: 100%; text-align: center;
    color: #fff; z-index: 3; text-shadow: 0 2px 16px rgba(0,0,0,.5); }
  .hero-subtitle .title { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 600; }
  .hero-subtitle .hint { margin-top: .5rem; font-size: clamp(.9rem, 2vw, 1.2rem); opacity: .9; }

  .badge { position: absolute; top: 20px; right: 24px; z-index: 4; background: rgba(20,20,20,.85);
    color: #fff; padding: 10px 18px; border-radius: 12px; font-size: .95rem; display: flex; align-items: center; gap: 8px; }
  .arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 4; background: rgba(20,20,20,.8);
    color: #fff; width: 40px; height: 40px; border-radius: 10px; border: none; font-size: 1.2rem; cursor: pointer; }
  .arrow.left { left: 20px; } .arrow.right { right: 20px; }

  .outro { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; color: #a1a1a6; font-size: 1.5rem; }
</style>
</head>
<body>
  <section class="scroll-track" id="track">
    <div class="sticky-stage">
      <img class="bg-image" src="imagens_hero/imagem hero.jpg" alt="Fundo" />
      <div class="video-frame" id="frame">
        <video id="video" src="imagens_hero/Crie_um_vídeo_cinematográfico.mp4" muted loop playsinline autoplay></video>
      </div>
      <div class="hero-text"><h1>Immersive<br>Video Experience</h1></div>
      <div class="hero-subtitle">
        <div class="title">Cosmic Journey</div>
        <div class="hint">Scroll to Expand Demo</div>
      </div>
      <div class="badge">Video Expansion Text Blend ⌄</div>
      <button class="arrow left">‹</button>
      <button class="arrow right">›</button>
    </div>
  </section>
  <section class="outro">Fim do efeito ✦</section>

<script>
(() => {
  const track = document.getElementById('track');
  const frame = document.getElementById('frame');
  const video = document.getElementById('video');
  video.play().catch(() => {});

  const START_W = 360, START_H = 460, START_RADIUS = 24;

  function getProgress() {
    const rect = track.getBoundingClientRect();
    const scrollable = track.offsetHeight - window.innerHeight;
    const scrolled = Math.min(Math.max(-rect.top, 0), scrollable);
    return scrollable > 0 ? scrolled / scrollable : 0;
  }
  const easeOut = t => 1 - Math.pow(1 - t, 3);

  function update() {
    const p = easeOut(getProgress());
    const vw = window.innerWidth, vh = window.innerHeight;
    frame.style.setProperty('--w', (START_W + (vw - START_W) * p) + 'px');
    frame.style.setProperty('--h', (START_H + (vh - START_H) * p) + 'px');
    frame.style.setProperty('--radius', (START_RADIUS * (1 - p)) + 'px');
  }

  let active = false;
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !active) {
        active = true; window.addEventListener('scroll', update, { passive: true }); update();
      } else if (!entry.isIntersecting && active) {
        active = false; window.removeEventListener('scroll', update);
      }
    });
  }, { threshold: 0 });
  io.observe(track);
  window.addEventListener('resize', update, { passive: true });
  update();
})();
</script>
</body>
</html>
